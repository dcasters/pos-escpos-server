name: PHP Compatibility (8.0 - 8.4)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3', '8.4']
      fail-fast: false

    name: PHP ${{ matrix.php-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: gd, sockets, json
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check syntax (server.php)
        run: php -l server.php

      - name: Check syntax (lib/Escpos.php)
        run: php -l lib/Escpos.php

      - name: Run static analysis (deprecations & errors)
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -exec php -l {} \;
